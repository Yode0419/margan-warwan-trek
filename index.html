<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Margan &amp; Warwan Valley Trek｜替代行程路線</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%235b62e0'/%3E%3Cpath d='M15 75 40 35 55 60 65 45 85 75Z' fill='%23fff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div>
      <p class="eyebrow">Margan Valley &amp; Warwan Valley Trek</p>
      <h1>喀什米爾替代行程</h1>
    </div>
    <a class="btn btn-light" href="gpx/alt_FULL_Margan_Warwan_Trek.gpx" download>⬇ 完整 GPX</a>
  </div>
</header>

<main>
  <section id="map-wrap">
    <div id="map"></div>
  </section>

  <nav id="day-tabs" aria-label="每日行程"></nav>

  <section id="day-panel">
    <div class="card" id="day-card">
      <div class="card-head">
        <span class="day-badge" id="day-badge"></span>
        <h2 id="day-title"></h2>
      </div>
      <p id="day-desc"></p>
      <ul class="stats" id="day-stats"></ul>
      <div class="card-actions">
        <a class="btn" id="day-download" href="#" download>⬇ 下載本日 GPX</a>
        <button class="btn btn-outline" id="fit-btn" type="button">⤢ 縮放至路線</button>
      </div>
    </div>

    <div class="card" id="elev-card" hidden>
      <h3>海拔 <span class="muted" id="elev-meta"></span></h3>
      <div class="chart-box"><canvas id="elev-chart"></canvas></div>
    </div>

    <p class="footnote">徒步段為 OpenStreetMap 實測路徑組合，車程段以 OSRM 沿實際道路產生；
    海拔取自 90 m DEM，實際數值以現場為準。地圖底圖需網路連線。</p>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
